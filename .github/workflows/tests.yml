name: tests

on:
  push:
  pull_request:

jobs:
  nudge:
    name: nudge test-suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux at

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        # Silence the runner's pre-installed untrusted tap (aws/tap) warning --
        # irrelevant here since tmux/bash come from homebrew/core. BSD `at`
        # (/usr/bin/at) already ships with macOS, so only tmux + bash are
        # needed. macOS ships bash 3.2 (Apple froze it for GPLv3 reasons);
        # the media scripts need 4.3+ for namerefs, and homebrew's bin is
        # ahead of /bin on the runner PATH so `env bash` picks up the newer
        # one.
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install tmux bash

      # Every script, not just nudge. The other six were covered only
      # incidentally, by test files that source them -- and cue2flac was not
      # covered at all until it got a test file, so a stray quote or missing
      # `fi` in it reached main with CI green. Sourcing is a side effect, not a
      # syntax check; this is the one that is actually about syntax.
      - name: Syntax check
        run: |
          for f in scripts/*; do bash -n "$f"; done
          for f in tests/*.sh; do bash -n "$f"; done

      - name: Run test-suite
        run: bash tests/run.sh

  # The Makefile is how every utility here gets onto a PATH, and until now no
  # workflow ran it: `make`, `make check` and `make link` had no CI at all. A
  # `make` that exits 0 while installing a non-functional bin/ therefore shipped
  # green -- which is exactly how the CARGO_TARGET_DIR dangling-symlink bug got
  # out, caught only by hand.
  #
  # Ubuntu only, and deliberately: `make check` also runs `cargo test`, so
  # putting it on the macOS leg above would mean provisioning a Rust toolchain
  # and paying for a second macOS Rust build that nudge-rs.yml already does --
  # for zero extra bash coverage, since the suite it runs is the same one. The
  # gap this closes is "nothing drives the Makefile", not "the Makefile is
  # untested on macOS", so it is exercised once, here.
  make:
    name: make (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable

      # `make check` runs the bash suite, which wants tmux + at (the e2e files
      # self-skip without them -- installing them keeps `make check` here
      # equivalent to the matrix job's run rather than a quietly emptier one).
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux at

      - name: make
        run: make

      # `test -x` follows the symlink, so a dangling bin/nudge fails here
      # instead of reporting success -- precisely the failure mode the rest of
      # CI cannot see. `test -L` pins the other half of the Makefile's promise:
      # the scripts are symlinked, so editing one takes effect immediately.
      - name: Installed utilities resolve
        run: |
          test -x bin/nudge
          test -L bin/bisect_img
          test -x bin/bisect_img
          ./bin/nudge --version

      # The documented entry point itself, rather than a parallel copy of what
      # it happens to run today.
      - name: make check
        run: make check
